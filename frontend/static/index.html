<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wash Flow Control Center</title>
    <meta
      name="description"
      content="Modernes Control-Center zur Verwaltung von Kategorien, Kleidungsstuecken, Waschprogrammen, Empfehlungen und Waschgaengen."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eefdf6",
                100: "#d6f8e8",
                300: "#66d9ad",
                500: "#11b57b",
                700: "#0b6e4b",
                900: "#083f2c",
              },
              accent: {
                100: "#fff1e8",
                300: "#ffd5b7",
                500: "#ff8b4d",
                700: "#c7571f",
              },
              ink: {
                900: "#0e1b22",
                700: "#26414f",
                500: "#537282",
                300: "#9cb4c0",
                100: "#eef3f6",
              },
            },
            boxShadow: {
              glow: "0 20px 60px -20px rgba(17, 181, 123, 0.45)",
            },
          },
        },
      };
    </script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="text-ink-900">
    <div class="app-bg-orb app-bg-orb-a"></div>
    <div class="app-bg-orb app-bg-orb-b"></div>

    <div class="relative z-10 min-h-screen lg:grid lg:grid-cols-[280px_1fr]">
      <aside
        class="glass-panel border-b border-white/40 p-5 lg:min-h-screen lg:border-b-0 lg:border-r"
      >
        <div class="flex items-center gap-3">
          <div
            class="grid h-11 w-11 place-items-center rounded-2xl bg-brand-500 text-white shadow-glow"
          >
            <i class="fa-solid fa-soap"></i>
          </div>
          <div>
            <p class="text-xs uppercase tracking-[0.28em] text-ink-500">
              Control Hub
            </p>
            <h1 class="font-display text-xl">Wash Flow</h1>
          </div>
        </div>

        <p class="mt-6 text-sm text-ink-700">
          Ein zentrales Dashboard fuer alle Services: schnell, modern und voll
          API-gesteuert.
        </p>

        <nav id="entityNav" class="mt-6 grid gap-2"></nav>

        <div class="mt-7 rounded-2xl bg-white/75 p-4">
          <p class="text-xs uppercase tracking-[0.2em] text-ink-500">Gateway</p>
          <p class="mt-2 text-sm text-ink-700">
            Alle Requests laufen ueber
            <span class="font-semibold">/api/*</span>.
          </p>
        </div>
      </aside>

      <main class="p-4 sm:p-6 lg:p-9">
        <section
          class="glass-panel reveal rounded-3xl border border-white/45 p-5 sm:p-7"
        >
          <div class="flex flex-wrap items-center justify-between gap-4">
            <div>
              <p class="text-xs uppercase tracking-[0.28em] text-ink-500">
                Live Data Board
              </p>
              <h2 id="viewTitle" class="mt-1 font-display text-3xl">
                Uebersicht
              </h2>
              <p id="viewSubtitle" class="mt-2 text-sm text-ink-700"></p>
            </div>

            <div class="flex items-center gap-2">
              <button
                id="refreshBtn"
                class="btn-secondary rounded-xl px-4 py-2.5 text-sm font-medium"
              >
                <i class="fa-solid fa-rotate-right mr-2"></i>Refresh
              </button>
              <button
                id="createBtn"
                class="btn-primary rounded-xl px-4 py-2.5 text-sm font-semibold text-white"
              >
                <i class="fa-solid fa-plus mr-2"></i>Neu anlegen
              </button>
            </div>
          </div>

          <div id="statsBar" class="mt-6 grid gap-3 sm:grid-cols-3"></div>

          <div
            class="mt-6 overflow-hidden rounded-2xl border border-white/50 bg-white/70"
          >
            <div id="tableContainer" class="overflow-x-auto"></div>
          </div>

          <div
            id="cardsContainer"
            class="mt-5 grid gap-4 sm:grid-cols-2 xl:grid-cols-3"
          ></div>
        </section>
      </main>
    </div>

    <section id="editorBackdrop" class="modal-backdrop hidden">
      <div class="side-panel">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-xs uppercase tracking-[0.22em] text-ink-500">
              Entity Editor
            </p>
            <h3 id="editorTitle" class="mt-1 font-display text-2xl"></h3>
          </div>
          <button id="closeEditorBtn" class="icon-btn" aria-label="Schliessen">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <form id="editorForm" class="mt-6 grid gap-4">
          <div id="editorFields" class="grid gap-3"></div>

          <div id="patchFieldsWrap" class="hidden">
            <label class="field-label" for="patchFieldsInput">
              PATCH-Felder (Komma-getrennt, optional)
            </label>
            <input
              id="patchFieldsInput"
              class="field-input"
              placeholder="z. B. status,waschprogrammId"
            />
          </div>

          <div class="grid gap-2 rounded-xl bg-ink-100/60 p-3">
            <label class="field-label" for="requestMethod">Methode</label>
            <select id="requestMethod" class="field-input">
              <option value="POST">POST (Anlegen)</option>
              <option value="PUT">PUT (Vollstaendig aktualisieren)</option>
              <option value="PATCH">PATCH (Teilweise aktualisieren)</option>
            </select>
          </div>

          <button
            class="btn-primary mt-1 rounded-xl px-4 py-3 text-sm font-semibold text-white"
          >
            Aktion ausfuehren
          </button>
        </form>
      </div>
    </section>

    <section id="deleteBackdrop" class="modal-backdrop hidden">
      <div class="dialog-panel">
        <div class="flex items-center gap-3">
          <div
            class="grid h-10 w-10 place-items-center rounded-xl bg-red-500/15 text-red-700"
          >
            <i class="fa-solid fa-trash"></i>
          </div>
          <div>
            <h3 class="font-display text-xl">Eintrag loeschen?</h3>
            <p class="text-sm text-ink-700">
              Diese Aktion kann nicht rueckgaengig gemacht werden.
            </p>
          </div>
        </div>

        <pre
          id="deletePreview"
          class="mt-4 max-h-36 overflow-auto rounded-xl bg-ink-900 p-3 text-xs text-white"
        ></pre>

        <div class="mt-4 flex justify-end gap-2">
          <button
            id="cancelDeleteBtn"
            class="btn-secondary rounded-xl px-4 py-2.5 text-sm"
          >
            Abbrechen
          </button>
          <button
            id="confirmDeleteBtn"
            class="rounded-xl bg-red-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-red-700"
          >
            Endgueltig loeschen
          </button>
        </div>
      </div>
    </section>

    <div
      id="toastHost"
      class="pointer-events-none fixed bottom-4 right-4 z-50 grid gap-3"
    ></div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
