name: portfolio-vs

services:
  kleidung-service:
    build:
      context: ./kleidung-service
      dockerfile: Dockerfile
    container_name: kleidung-service
    env_file:
      - ./kleidung-service/.env
    environment:
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 1234
      NODE_ENV: production
    ports:
      - "1234:1234"
    volumes:
      - ./kleidung-service/db_ks.sqlite:/app/db_ks.sqlite
    restart: unless-stopped

  wasch-service:
    build:
      context: ./wasch-service
      dockerfile: Dockerfile
    container_name: wasch-service
    env_file:
      - ./wasch-service/.env
    environment:
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 4321
      NODE_ENV: production
    ports:
      - "4321:4321"
    volumes:
      - ./wasch-service/db_ws.sqlite:/app/db_ws.sqlite
    restart: unless-stopped
